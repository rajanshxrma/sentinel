---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: selfhealpolicies.apps.sentinel.dev
spec:
  group: apps.sentinel.dev
  names:
    kind: SelfHealPolicy
    listKind: SelfHealPolicyList
    plural: selfhealpolicies
    singular: selfhealpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Deployments matched by this policy
      jsonPath: .status.targets[*].name
      name: Targets
      type: string
    - description: Lifetime remediation count
      jsonPath: .status.totalRemediations
      name: Remediations
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SelfHealPolicy is the Schema for the selfhealpolicies API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of SelfHealPolicy
            properties:
              cooldown:
                default: 10m
                description: |-
                  cooldown is the minimum time that must elapse between two remediations
                  of the same target.
                type: string
              dryRun:
                default: false
                description: |-
                  dryRun, when true, evaluates targets and emits events/metrics as usual
                  but never patches a Deployment.
                type: boolean
              failureThreshold:
                default: 3
                description: |-
                  failureThreshold is the number of observed container restarts within
                  observationWindow (or a detected CrashLoopBackOff) that marks a target
                  as unhealthy.
                format: int32
                minimum: 1
                type: integer
              maxRestarts:
                default: 5
                description: |-
                  maxRestarts is the maximum number of remediations allowed for a single
                  target within maxRestartsWindow before it is marked Degraded and
                  remediation stops.
                format: int32
                minimum: 1
                type: integer
              maxRestartsWindow:
                default: 1h
                description: |-
                  maxRestartsWindow is the time window over which maxRestarts is
                  enforced (the remediation budget).
                type: string
              observationWindow:
                default: 5m
                description: |-
                  observationWindow is the sliding time window over which restarts are
                  counted toward failureThreshold.
                type: string
              selector:
                description: |-
                  selector chooses which Deployments in this namespace are managed by
                  this policy.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - selector
            type: object
          status:
            description: status defines the observed state of SelfHealPolicy
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the SelfHealPolicy resource.

                  Standard condition types include:
                  - "Ready": the controller is actively evaluating and remediating targets
                  - "Degraded": at least one target has exhausted its remediation budget

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  observedGeneration is the most recent generation observed by the
                  controller.
                format: int64
                type: integer
              targets:
                description: |-
                  targets reports per-Deployment health and remediation state for every
                  target currently matched by selector.
                items:
                  description: |-
                    TargetStatus reports the observed health and remediation history of a
                    single Deployment matched by a SelfHealPolicy's selector.
                  properties:
                    healthy:
                      description: |-
                        healthy reports whether the target is currently within its failure
                        threshold.
                      type: boolean
                    lastRemediation:
                      description: lastRemediation is the timestamp of the most recent
                        remediation.
                      format: date-time
                      type: string
                    name:
                      description: name is the Deployment name.
                      type: string
                    observedRestarts:
                      description: |-
                        observedRestarts is the most recently observed restart count summed
                        across the target's pods within the observation window.
                      format: int32
                      type: integer
                    phase:
                      description: phase is the current remediation lifecycle phase
                        of this target.
                      enum:
                      - Healthy
                      - Remediating
                      - CoolingDown
                      - Degraded
                      type: string
                    remediationCount:
                      description: |-
                        remediationCount is the number of remediations performed against this
                        target within the current maxRestartsWindow.
                      format: int32
                      type: integer
                  required:
                  - name
                  type: object
                type: array
              totalRemediations:
                description: |-
                  totalRemediations is the lifetime count of remediations performed by
                  this policy across all targets.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
