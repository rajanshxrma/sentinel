# This rule is not used by the project sentinel itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the apps.sentinel.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: sentinel
    app.kubernetes.io/managed-by: kustomize
  name: selfhealpolicy-editor-role
rules:
- apiGroups:
  - apps.sentinel.dev
  resources:
  - selfhealpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps.sentinel.dev
  resources:
  - selfhealpolicies/status
  verbs:
  - get
